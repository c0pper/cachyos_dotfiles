# Add your additional Hyprland configurations here
cursor {
    no_hardware_cursors = false
}

# Autostart
exec-once = hyprpm reload
exec-once = Telegram
exec-once = sunshine
exec-once = elecwhat

# Plugins
plugin {
    hyprexpo {
        columns = 3
        gap_size = 20
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        #gesture_distance = 300 # how far is the "max" for the gesture
    }

    hyprbars {
        # example config
        bar_height = 20

        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(ff4040), 12, 󰖭, hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 10, , hyprctl disp\atch fullscreen 1
    }

    
    hyprfocus {
      enabled = yes
      animate_floating = yes 
      animate_workspacechange = yes
      focus_animation = flash
        # Beziers for focus animations
      bezier = bezIn, 0.5, 0.0, 1.0, 0.5
      bezier = bezOut, 0.0, 0.5, 0.5, 1.0
      bezier = overshot, 0.05, 0.9, 0.1, 1.05
      bezier = smoothOut, 0.36, 0, 0.66, -0.56
      bezier = smoothIn, 0.25, 1, 0.5, 1
      bezier = realsmooth, 0.28, 0.29, 0.69, 1.08
      bezier = easeInOutBack, 0.68, -0.6, 0.32, 1.6
        # Flash settings
      flash {
        flash_opacity = 0.7
        in_bezier = bezIn
        in_speed = 0.5
        out_bezier = bezOut
        out_speed = 3
      }
        # Shrink settings
      shrink {
        shrink_percentage = 0.99
        in_bezier = easeInOutBack
        in_speed = 1.5
        out_bezier = easeInOutBack
        out_speed = 3
      }
    }
}


# Binds
unbind = ALT, TAB
unbind = CTRL, TAB
unbind = ALT SHIFT, TAB
unbind = , XF86Tools
unbind = SHIFT SUPER, H
unbind = SUPER, g

bind = , XF86Tools, exec, spotify-launcher
bind = ALT, TAB, exec, rofi -show window -replace -i -window-format "{w} · {t}"
bind = ALT SHIFT, TAB, exec, rofi -show window -replace -i -window-format "{w} · {t}" -kb-accept-entry '!Alt-Tab'
bind = SUPER, g, hyprexpo:expo, toggle
bind = SHIFT SUPER, X, exec, systemctl poweroff
bind = SHIFT SUPER, H, exec, sh -c /home/simo/.mydotfiles/com.ml4w.dotfiles.stable/.config/waybar/scripts/ha_rofi_menu.sh 


# Windows rules
windowrule {
    name = no-hyprbars-on-tiled-windows
    hyprbars:no_bar = true
    match:float = 0
}

#windowrule {
#    name = fullscreen-steam
#    fullscreen = true
#    match:class = steam_app_default
#    workspace = 10
#}

windowrule {
    name = hyprbars-on-terminal
    hyprbars:no_bar = false
    match:class = ^(kitty|org.kde.kate|anki|octopi|org.qbittorrent.qBittorrent|elecwhat)$
}

windowrule {
  name = firefox-to-ws
  match:class = firefox
  workspace = 1
}

windowrule {
  name = nautilus-to-ws
  match:class = org.gnome.Nautilus
  workspace = 2
}

windowrule {
  name = code-to-ws
  match:class = code
  workspace = 3
}

windowrule {
  name = spt-to-ws
  match:class = spotify
  workspace = 4
}

windowrule {
  name = telegram-to-ws
  match:class = ^(org.telegram.desktop|elecwhat)$
  workspace = 5 silent
}

windowrule {
  name = winboat-to-ws
  match:class = xfreerdp
  workspace = 8
}
